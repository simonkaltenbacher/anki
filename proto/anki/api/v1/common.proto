syntax = "proto3";

package anki.api.v1;

enum SortDirection {
  SORT_DIRECTION_ASCENDING = 0;
  SORT_DIRECTION_DESCENDING = 1;
}

// Structured application error detail attached to gRPC status details.
// `code` values are stable integration contract values (for example
// `VERSION_CONFLICT` for optimistic concurrency failures).
message ErrorDetail {
  string code = 1;
  bool retryable = 2;
  string message = 3;
}
