syntax = "proto3";

package anki.api.v1;

// Lightweight custom health endpoint for API-level health checks.
// The server may additionally expose standard `grpc.health.v1.Health`.
service HealthService {
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_SERVING = 1;
    STATUS_NOT_SERVING = 2;
  }

  Status status = 1;
}
